# =============================================================================
# other_funding.yaml — 他制度応募・受入状況（様式3-1 / 様式3-2 のデータソース）
# =============================================================================
# 対応様式:
#   様式3-1: 研究代表者の他制度応募・受入状況
#   様式3-2: 研究分担者の他制度応募・受入状況
# 参照先: fill_forms.py (step02_docx)
#
# テーブル構造（様式3-1/3-2共通、6行×8列）:
#   Col 1: 番号（自動採番）
#   Col 2: 状態（応募中 / 受入中）
#   Col 3: 制度名、実施期間、配分機関等名
#   Col 4: 研究課題名（研究代表者氏名）
#   Col 5: 役割（代表・分担の別）
#   Col 6: 本人の受入れ予算額（研究課題全体の予算額）（千円）
#   Col 7: 令和8年度のエフォート(%)
#   Col 8: 研究内容の相違点及び他の研究費に加えて本応募研究課題に応募する理由
#
# 注意:
#   - Row 1 は「本研究課題」として自動記入される（fill_forms.py側で処理）
#   - Row 2〜5 に entries の内容を順に記入（最大4件）
#   - 空リスト（entries: []）= 他制度応募なし → Row 2以降は空欄
# =============================================================================

# ---------------------------------------------------------------------------
# pi_funding: 研究代表者（福山 啓太）の他制度応募・受入状況
# → 様式3-1（r08youshiki1_5.docx Table 10）
# ---------------------------------------------------------------------------
pi_funding:
  # 出典: refs/effort_fk.pdf（e-Rad エフォート一覧、研究者番号 60856384、2026年度）
  entries:
    # 1. 文部科学省 若手研究（採択済、研究代表者）
    - status: "受入中"
      program_name: "若手研究"
      period: "R6〜R8"
      agency: "文部科学省"
      project_title: "スマートフォンを利用した非接触型呼吸モニタリング手法の開発"
      role: "代表"
      budget: 1300       # R8 配分予定額（千円）
      total_budget: 1300 # 課題期間総額（千円、※ 1,300千円は単年度ベース、3か年積算は要確認）
      effort_percent: 10
      difference: >-
        本課題は呼吸モニタリングのデバイス開発に焦点を当てているのに対し、
        本応募研究はサイバー攻撃時の地域医療提供体制のシミュレーション技術
        開発を目的としており、対象・手法が異なる。
      confidential: false

    # 2. 厚生労働省 難治性疾患政策研究事業（採択済、研究分担者）
    - status: "受入中"
      program_name: "難治性疾患政策研究事業（24FC0401）"
      period: "R6〜R8"
      agency: "厚生労働省"
      project_title: "指定難病患者データベース・小児慢性特定疾病児童等データベースの運用に資する研究"
      role: "分担"
      budget: 0
      total_budget: 0
      effort_percent: 5
      difference: >-
        本課題は難病・小慢DBの運用基盤整備が目的であり、本応募研究の
        サイバー攻撃影響シミュレーション技術開発とは対象データ・目的・手法が
        いずれも異なる。
      confidential: false

    # 3. AMED 循環器疾患・糖尿病等生活習慣病対策実用化研究（みなし計上、研究分担者）
    - status: "受入中"
      program_name: "循環器疾患・糖尿病等生活習慣病対策実用化研究事業"
      period: "R6〜R8"
      agency: "国立研究開発法人日本医療研究開発機構（AMED）"
      project_title: "大規模言語モデルで構築する栄養指導記録構造化データベースを用いた糖尿病栄養指導エビデンス創出研究"
      role: "分担"
      budget: 0
      total_budget: 0
      effort_percent: 5
      difference: >-
        本課題は栄養指導記録の構造化データベース構築が目的であり、
        本応募研究のインフラサイバー攻撃シミュレーション技術開発とは対象・
        手法が異なる。
      confidential: false

