# =============================================================================
# other_funding.yaml — 他制度応募・受入状況（様式3-1 / 様式3-2 のデータソース）
# =============================================================================
# 対応様式:
#   様式3-1: 研究代表者の他制度応募・受入状況
#   様式3-2: 研究分担者の他制度応募・受入状況
# 参照先: fill_forms.py (step02_docx)
#
# テーブル構造（様式3-1/3-2共通、6行×8列）:
#   Col 1: 番号（自動採番）
#   Col 2: 状態（応募中 / 受入中）
#   Col 3: 制度名、実施期間、配分機関等名
#   Col 4: 研究課題名（研究代表者氏名）
#   Col 5: 役割（代表・分担の別）
#   Col 6: 本人の受入れ予算額（研究課題全体の予算額）（千円）
#   Col 7: 令和8年度のエフォート(%)
#   Col 8: 研究内容の相違点及び他の研究費に加えて本応募研究課題に応募する理由
#
# 注意:
#   - Row 1 は「本研究課題」として自動記入される（fill_forms.py側で処理）
#     → config.yaml, researchers.yaml の値を使用
#   - Row 2〜5 に entries の内容を順に記入（最大4件）
#   - 6件以上ある場合は行追加が必要（別紙2 §4: 「行が足りない場合は行を追加」）
#   - 空リスト（entries: []）= 他制度応募なし → Row 2以降は空欄
# =============================================================================

# ---------------------------------------------------------------------------
# pi_funding: 研究代表者の他制度応募・受入状況
# → 様式3-1（r08youshiki1_5.docx Table 10）
# ---------------------------------------------------------------------------
pi_funding:
  entries:
    - status: "受入中"          # "応募中" or "受入中"
      program_name: "科学研究費助成事業 基盤研究(B)"  # 制度名
      period: "R5〜R8"          # 研究期間
      agency: "日本学術振興会"   # 配分機関等名
      project_title: "○○に関する研究"  # 研究課題名
      role: "代表"              # 代表 or 分担
      budget: 5000              # 本人の受入れ予算額（千円）
      total_budget: 15000       # 研究課題全体の予算額（千円）— Col 6 括弧内
      effort_percent: 20        # 令和8年度のエフォート(%)
      difference: >-
        科研費基盤Bでは○○の基礎的メカニズム解明を目的としているのに対し、
        本課題では迅速検出システムの開発に焦点を当てており、研究目的・方法が異なる。
      confidential: false
      # ※ confidential: true の場合、配分機関等名と予算額を記入しないことができる
      #   （別紙2 §4【様式3-1】: 秘密保持契約等のやむを得ない事情がある場合）

    # --- 追加エントリのテンプレート ---
    # - status: "応募中"
    #   program_name: ""
    #   period: ""
    #   agency: ""
    #   project_title: ""
    #   role: "代表"
    #   budget: 0
    #   total_budget: 0
    #   effort_percent: 0
    #   difference: ""
    #   confidential: false

# ---------------------------------------------------------------------------
# co_investigator_funding: 各研究分担者の他制度応募・受入状況
# → 様式3-2（r08youshiki1_5.docx Table 11）
#
# researcher_name は researchers.yaml の co_investigators[].name_ja と一致させること。
# 分担者ごとに1つのエントリを持ち、構造は pi_funding と同一。
# ---------------------------------------------------------------------------
co_investigator_funding:
  - researcher_name: "△△ △△"
    entries:
      - status: "受入中"
        program_name: "科学研究費助成事業 若手研究"
        period: "R6〜R9"
        agency: "日本学術振興会"
        project_title: "○○に関する研究"
        role: "代表"
        budget: 3000
        total_budget: 5000
        effort_percent: 15
        difference: >-
          若手研究では○○の臨床的側面に焦点を当てているのに対し、
          本課題では薬剤感受性試験法の高度化を担当しており、研究内容が異なる。
        confidential: false

  # --- 追加分担者のテンプレート ---
  # - researcher_name: "○○ ○○"
  #   entries: []  # 該当なしの場合は空リスト
