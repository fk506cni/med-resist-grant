# =============================================================================
# researchers.yaml — 研究者情報（全提出書類の共通データソース）
# =============================================================================
# 対応様式:
#   様式1-1 ⑨⑩⑪: PI連絡先、経理担当者、研究者リスト
#   様式4-1: 研究代表者調書（CV 10項目）
#   様式4-2: 研究分担者調書（CV 10項目）
#   様式7 (Excel): 研究者一覧（機関名, 氏名, 部局・職）
#   様式3-1/3-2: 他制度応募（エフォート率）
#   別紙5・別添: セキュリティ質問票の研究者識別
# 参照先: fill_forms.py (step02_docx), fill_excel.py (step03_excel)
#
# CV 10項目（様式4-1/4-2テーブル構造）:
#   1. 研究課題名（config.yaml から自動取得）
#   2. ふりがな/氏名, 生年月日/年齢
#   3. 研究者番号
#   4. 所属機関・部局・職/職階, 最終学歴・学位
#   5. 専門分野
#   6. 主な経歴
#   7. 特筆すべき競争的研究資金獲得実績
#   8. 受賞歴・表彰歴
#   9. 本研究課題に関連する主な研究論文・著書
#  10. 本研究課題に関連する主な知的財産権
# =============================================================================

# ---------------------------------------------------------------------------
# pi: 研究代表者（1名のみ）
# → 様式1-1 ⑨, 様式4-1, 様式7, 様式3-1
# ---------------------------------------------------------------------------
pi:
  # --- 基本情報 ---
  name_ja: "福山 啓太"
  name_en: "Keita FUKUYAMA"
  furigana: "ふくやま けいた"
  nationality: "日本"  # PIは日本国籍必須（募集要項 §2.2.3）

  # --- 様式4-1 Row 1: 生年月日/年齢 ---
  birth_date: "19XX年XX月XX日"
  age: XX  # 応募時点の年齢

  # --- 様式4-1 Row 2: 研究者番号 ---
  researcher_id: "○○○○○○○○"  # e-Rad研究者番号（8桁）

  # --- 様式4-1 Row 3: 所属機関・部局・職/職階 ---
  # → 様式1-1 ⑨, 様式7 C/E列にも使用
  affiliation: "京都大学"
  department: "医学部附属病院 医療情報企画部"
  position: "特定助教"

  # --- 様式4-1 Row 3: 最終学歴・学位 ---
  education:
    school: "○○大学大学院○○学研究科"
    graduation_year: "20XX年3月修了"
    degree: "博士（○○学）"

  # --- 様式4-1 Row 4: 専門分野 ---
  specialty: "医療情報学、医療ビッグデータ解析、シミュレーション工学"

  # --- 様式4-1 Row 5: 主な経歴 ---
  career_history:
    - year_month: "20XX年4月"
      description: "○○大学○○ ○○（○○）"
    - year_month: "20XX年4月"
      description: "京都大学医学部附属病院 医療情報企画部 特定助教（現職）"

  # --- 様式4-1 Row 6: 特筆すべき競争的研究資金獲得実績 ---
  funding_history:
    - program: "○○"
      title: "○○に関する研究"
      role: "代表"
      period: "20XX年度〜20XX年度"
      amount: "○○千円"

  # --- 様式4-1 Row 7: 受賞歴・表彰歴 ---
  awards:
    - year_month: "2025年11月"
      name: "第45回医療情報学連合大会 Young Investigator Award (YIA)"

  # --- 様式4-1 Row 8: 本研究課題に関連する主な研究論文・著書 ---
  publications:
    - authors: "Fukuyama K, Mori Y, Ueshima H, Ito S, Tanabe M, Kuroda T"
      title: "Medical resource usage for COVID-19 evaluated using the National Database of Health Insurance Claims and Specific Health Checkups of Japan"
      journal: "PLOS ONE"
      year: 2024

    - authors: "Fukuyama K, Mori Y, Kuroda T, Kikuchi H"
      title: "Cancer Risk Evaluation with Diabetes Mellitus by a Large Medical Claims Dataset"
      journal: "Proc. SCIS&ISIS 2024"
      year: 2024

    - authors: "Tsutsumi T, Fukuyama K, Kishimoto K, Mori Y, Sugiyama O, Yamamoto G, Kurata M, Ueshima H, Saito K, Kuroda T, Ohtsuru S"
      title: "Operating table stability and patient safety during an earthquake based on the results of a shaking table experiment"
      journal: "BJA Open"
      year: 2024

  # --- 様式4-1 Row 9: 本研究課題に関連する主な知的財産権 ---
  patents: []

  # --- researchmap ---
  researchmap_id: "○○○○○○○"

  # --- 様式1-1 ⑨連絡先 ---
  contact:
    postal: "〒606-8507 京都府京都市左京区聖護院川原町54 京都大学医学部附属病院 医療情報企画部"
    tel: "075-○○○-○○○○"
    email: "○○@kuhp.kyoto-u.ac.jp"

  # --- エフォート・担当業務 ---
  effort_percent: 40
  tasks: "研究統括、医療ビッグデータ解析・影響評価モデル開発"

