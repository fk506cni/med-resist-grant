# =============================================================================
# config.yaml — プロジェクトメタデータ（全提出書類の共通データソース）
# =============================================================================
# 対応様式: 様式1-1, 様式2-1, 様式2-2, 様式6(Excel)
# 参照先: fill_forms.py (step02_docx), fill_excel.py (step03_excel)
#
# 金額の単位: 千円（様式準拠、消費税込み）
# =============================================================================

# ---------------------------------------------------------------------------
# project: プロジェクト基本情報
# → 様式1-1 ①〜⑧, 様式6 D〜N列
# ---------------------------------------------------------------------------
project:
  # 様式1-1 ①研究テーマ / 様式6 D列
  theme_number: 23  # (23) 医療・医工学に関する基礎研究

  # 様式1-1 ②研究課題名（日）/ 様式6 I列
  # ※ 学内審査資料準拠の正式タイトル
  title_ja: "基盤インフラに対するサイバー攻撃が地域医療提供体制に及ぼす影響をシミュレーションする技術の開発"

  # 様式1-1 ②研究課題名（英）
  title_en: "Development of Simulation Technology for Assessing the Impact of Cyberattacks on Critical Infrastructure on Regional Healthcare Delivery Systems"

  # 様式1-1 ③研究分野 / 様式6 F列
  # 選択肢: 知能 / 情報 / 通信 / 電気 / 電子 / 光 / 材料 / 機械 / 医療 / その他
  field: "医療"

  # 様式1-1 ④キーワード / 様式6 E列
  # 最大5つ（募集要項 別紙1参照）
  keywords:
    - "救急医療体制"
    - "医療ビッグデータ"
    - "災害医療シミュレーション"
    - "サイバーセキュリティ"
    - "基盤インフラ防護"

  # 様式1-1 ⑤研究の概要（180字以内、一般向け平易な表現）
  summary: >-
    2026年3月、経済安全保障推進法の改正案により医療分野が基盤インフラに追加された。
    しかし、電力・通信等のインフラや病院へのサイバー攻撃が地域医療に及ぼす影響の
    体系的な評価手法は確立されていない。本研究では、レセプト・DPC・救急搬送等の
    医療ビッグデータとインフラ稼働情報を用いて、サイバー攻撃時の地域医療提供体制の
    維持可能性を定量的に評価・予測するシミュレーション技術を開発する。

  # 様式1-1 ⑧タイプ / 様式6 G列
  # 選択肢: S / A / C / D(S相当) / D(A相当) / D(C相当)
  type: "A"  # 年間最大5200万円（直接経費4,000万円+間接経費30%）、最大3年

  # 様式1-1 ⑥研究期間 / 様式6 N列
  period_start: "R8"   # 令和8年度（2026年度、研究開始は12月以降）
  period_end: "R10"    # 令和10年度（最大3か年度）
  period_years: 3      # 様式6 N列用（研究期間の年数）

  # 様式1-1 ⑧重複応募の有無
  # 様式6 H列（委託事業と補助事業との重複の有無）
  duplicate_application: false

# ---------------------------------------------------------------------------
# lead_institution: 代表研究機関情報
# → 様式1-1 ⑨⑩の所属機関, 様式6 L/W/X/Y/Z列
# ---------------------------------------------------------------------------
lead_institution:
  # 様式1-1 ⑨⑩の所属機関名 / 様式6 L列
  name: "京都大学"

  # 様式6 W列: 代表研究機関の種別
  # 選択肢: 大学等 / 公的研究機関 / 公益法人等 / 企業等
  type: "大学等"

  # 様式6 X列: 中小企業に該当するか
  is_sme: false

  # 様式6 Y列: スタートアップに該当するか
  is_startup: false

  # 様式6 Z列: 大学発スタートアップの場合の大学名（該当しない場合は空文字）
  university_origin: ""

  # 所在地
  address: "京都府京都市左京区聖護院川原町54"

  # 全省庁統一資格等級（A/B/C/D）— SPEC.md §5 応募資格要件
  procurement_grade: "A"

  # 参考様式の署名者（委託契約の最終権限者）
  authorized_signer:
    name: "○○ ○○"       # 病院長 or 契約担当部署の長
    title: "○○○○"

# ---------------------------------------------------------------------------
# sub_institutions: 分担研究機関情報
# → 様式6 M/AA/AB/AC列, 様式2-1 Table 4
# ---------------------------------------------------------------------------
# 分担研究機関なし（全額京都大学で実施）
sub_institutions: []

# ---------------------------------------------------------------------------
# contacts: 連絡先情報
# → 様式8 (Excel)
# ---------------------------------------------------------------------------
contacts:
  # 様式8: 通知用メールアドレスリスト（最大10件）
  # B3 = 研究代表者メール（必須）、B4〜B12 = 追加連絡先
  emails:
    - "○○@kuhp.kyoto-u.ac.jp"    # 研究代表者（様式8 B3 / 様式6 U列）
    - "○○@kuhp.kyoto-u.ac.jp"    # 経理事務担当者

# ---------------------------------------------------------------------------
# budget: 予算情報
# → 様式1-1 ⑦申請額, 様式2-1, 様式2-2, 様式6 O〜S列
# ---------------------------------------------------------------------------
budget:
  # 間接経費率（様式2-1 備考「原則30%」）
  indirect_rate: 0.3

  # ---------------------------------------------------------------------------
  # yearly: 年度別経費内訳
  # → 様式2-1 Table 3（研究費見込額）, 様式1-1 ⑦申請額, 様式6 O〜S列
  #
  # 自動計算フィールド（YAMLには記載不要、スクリプト側で算出）:
  #   物品費 = equipment + consumables（様式2-1 ア．物品費）
  #   直接経費 = equipment + consumables + travel + personnel + other
  #   間接経費 = 直接経費 × indirect_rate
  #   合計 = 直接経費 + 間接経費（= 様式1-1 ⑦ / 様式6 O〜S列の値）
  #
  # 総額（3年間）: 150,000千円（= 150百万円 = 1億5,000万円）
  # 1年目（R8）は12月頃開始のため約4ヶ月分（設備購入を前倒し）
  # ---------------------------------------------------------------------------
  yearly:
    # --- 1年目（R8 = 令和8年度、12月〜3月の約4ヶ月） ---
    - year: 1
      equipment: 20000    # 設備備品費（千円）— GPU計算サーバ、ストレージ
      consumables: 1000   # 消耗品費（千円）— ソフトウェアライセンス、記録媒体
      travel: 500         # 旅費（千円）— 初年度は4ヶ月のため少額
      personnel: 7000     # 人件費・謝金（千円）— 特任研究員2名×4月、研究補助員×4月
      other: 10000        # その他（千円）— データ利用料、クラウド計算、消費税
      # 直接経費計: 38,500千円、間接経費: 11,550千円、合計: 50,050千円

    # --- 2年目（R9 = 令和9年度、通年） ---
    - year: 2
      equipment: 2000     # 追加ストレージ、ネットワーク機器
      consumables: 2000   # ソフトウェアライセンス更新、記録媒体
      travel: 2500        # 国内出張（学会発表・打合せ）
      personnel: 22000    # 特任研究員2名×12月、研究補助員2名×12月
      other: 10000        # データ利用料拡大、クラウド計算、論文投稿
      # 直接経費計: 38,500千円、間接経費: 11,550千円、合計: 50,050千円

    # --- 3年目（R10 = 令和10年度、通年） ---
    - year: 3
      equipment: 1000     # 解析用ワークステーション追加
      consumables: 2000   # ソフトウェアライセンス更新、記録媒体
      travel: 2500        # 国内出張（成果発表・打合せ）
      personnel: 22000    # 特任研究員2名×12月、研究補助員2名×12月
      other: 10885        # データ利用料、クラウド計算、論文投稿
      # 直接経費計: 38,385千円、間接経費: 11,516千円、合計: 49,901千円

  # ---------------------------------------------------------------------------
  # by_institution: 機関ごとの年度別予算内訳
  # → 様式2-1 Table 4（機関別研究費）
  # ---------------------------------------------------------------------------
  by_institution:
    - institution: "京都大学"
      yearly:
        - year: 1
          amount: 38500
        - year: 2
          amount: 38500
        - year: 3
          amount: 38385

  # ---------------------------------------------------------------------------
  # details: 品目レベル積算明細
  # → 様式2-2（年度別研究費計画書、Tables 5〜9）
  # ---------------------------------------------------------------------------
  details:
    # === 1年目（R8、12月〜3月） ===
    - year: 1
      line_items:
        # Ⅰ．物品費 — 1. 設備備品費
        - category: equipment
          name: "GPU計算サーバ（NVIDIA H100相当 GPU×4基搭載、○○社）"
          quantity: "1式"
          amount: 15000
          institution: "京都大学"
          justification: "サイバー攻撃シナリオの大規模シミュレーションおよび医療ビッグデータの高速解析処理に使用"

        - category: equipment
          name: "大容量ストレージシステム（100TB級、○○社）"
          quantity: "1式"
          amount: 5000
          institution: "京都大学"
          justification: "レセプト・DPC・救急搬送等の大規模医療データおよびシミュレーション結果の保管に使用"

        # Ⅰ．物品費 — 2. 消耗品費
        - category: consumables
          name: "ソフトウェアライセンス（GIS、統計解析、ネットワーク解析）・記録媒体"
          quantity: "一式"
          amount: 1000
          institution: "京都大学"
          justification: "地理情報システム、統計解析環境、インフラネットワーク解析の構築に使用"

        # Ⅱ．人件費・謝金
        - category: personnel
          name: "特任研究員（データサイエンティスト）"
          quantity: "1名×4月"
          amount: 2800
