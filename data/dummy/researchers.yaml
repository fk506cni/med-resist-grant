# =============================================================================
# researchers.yaml — 研究者情報（全提出書類の共通データソース）
# =============================================================================
# 対応様式:
#   様式1-1 ⑨⑩⑪: PI連絡先、経理担当者、研究者リスト
#   様式4-1: 研究代表者調書（CV 10項目）
#   様式4-2: 研究分担者調書（CV 10項目）
#   様式7 (Excel): 研究者一覧（機関名, 氏名, 部局・職）
#   様式3-1/3-2: 他制度応募（エフォート率）
#   別紙5・別添: セキュリティ質問票の研究者識別
# 参照先: fill_forms.py (step02_docx), fill_excel.py (step03_excel)
#
# CV 10項目（様式4-1/4-2テーブル構造）:
#   1. 研究課題名（config.yaml から自動取得）
#   2. ふりがな/氏名, 生年月日/年齢
#   3. 研究者番号
#   4. 所属機関・部局・職/職階, 最終学歴・学位
#   5. 専門分野
#   6. 主な経歴
#   7. 特筆すべき競争的研究資金獲得実績
#   8. 受賞歴・表彰歴
#   9. 本研究課題に関連する主な研究論文・著書
#  10. 本研究課題に関連する主な知的財産権
# =============================================================================

# ---------------------------------------------------------------------------
# pi: 研究代表者（1名のみ）
# → 様式1-1 ⑨, 様式4-1, 様式7, 様式3-1
# ---------------------------------------------------------------------------
pi:
  # --- 基本情報 ---
  name_ja: "○○ ○○"
  name_en: "Taro YAMADA"
  furigana: "やまだ たろう"
  nationality: "日本"  # PIは日本国籍必須（募集要項 §2.2.3）

  # --- 様式4-1 Row 1: 生年月日/年齢 ---
  birth_date: "19XX年XX月XX日"
  age: XX  # 応募時点の年齢

  # --- 様式4-1 Row 2: 研究者番号 ---
  researcher_id: "00000000"  # e-Rad研究者番号（8桁）

  # --- 様式4-1 Row 3: 所属機関・部局・職/職階 ---
  # → 様式1-1 ⑨, 様式7 C/E列にも使用
  affiliation: "○○大学"
  department: "○○学研究科"
  position: "教授"

  # --- 様式4-1 Row 3: 最終学歴・学位 ---
  education:
    school: "○○大学大学院○○学研究科"
    graduation_year: "20XX年3月修了"
    degree: "博士（○○学）"

  # --- 様式4-1 Row 4: 専門分野 ---
  specialty: "微生物学、感染症学、ゲノム科学"

  # --- 様式4-1 Row 5: 主な経歴 ---
  # ※ 現在の全ての所属機関・役職を含むこと（兼業、外国の人材登用プログラムへの
  #    参加、雇用契約のない名誉教授等を含む）。別紙2 §4【様式4-1】で「必ず記入」と明記。
  career_history:
    - year_month: "20XX年4月"
      description: "○○大学大学院○○学研究科 助教"
    - year_month: "20XX年4月"
      description: "○○大学大学院○○学研究科 准教授"
    - year_month: "20XX年4月"
      description: "○○大学大学院○○学研究科 教授（現職）"

  # --- 様式4-1 Row 6: 特筆すべき競争的研究資金獲得実績 ---
  funding_history:
    - program: "科学研究費助成事業 基盤研究(B)"
      title: "○○に関する研究"
      role: "代表"
      period: "20XX年度〜20XX年度"
      amount: "○○千円"
    - program: "AMED ○○研究事業"
      title: "○○の開発に関する研究"
      role: "分担"
      period: "20XX年度〜20XX年度"
      amount: "○○千円"

  # --- 様式4-1 Row 7: 受賞歴・表彰歴 ---
  # ※ 該当なしの場合は "無し" と記載
  awards:
    - year_month: "20XX年XX月"
      name: "○○学会 ○○賞"

  # --- 様式4-1 Row 8: 本研究課題に関連する主な研究論文・著書 ---
  # ※ 主要なもの5本程度を選んで記載（別紙2 §4【様式4-1】）
  # ※ researchmapの登録情報も活用すること
  publications:
    - authors: "Yamada T, Suzuki H, Tanaka K"
      title: "○○に関する研究"
      journal: "Journal of ○○"
      year: 20XX
    - authors: "Yamada T, Sato M"
      title: "○○の解析"
      journal: "○○学会誌"
      year: 20XX

  # --- 様式4-1 Row 9: 本研究課題に関連する主な知的財産権 ---
  # ※ 主要なもの5件程度
  patents:
    - title: "○○の検出方法"
      application_number: "特願20XX-XXXXXX"
      year: 20XX

  # --- researchmap ---
  researchmap_id: "XXXXXXX"  # researchmap研究者ID（任意、記載に活用）

  # --- 様式1-1 ⑨連絡先 ---
  contact:
    postal: "〒XXX-XXXX 東京都○○区○○ 1-2-3 ○○大学○○学研究科"
    tel: "03-XXXX-XXXX"
    email: "pi@example.ac.jp"

  # --- エフォート・担当業務 ---
  # → 様式3-1（他制度応募・エフォート率）、様式1-2 §7.1（研究体制表）
  effort_percent: 30
  tasks: "研究統括、ゲノム解析パイプラインの設計・構築、耐性遺伝子データベースの整備"

# ---------------------------------------------------------------------------
